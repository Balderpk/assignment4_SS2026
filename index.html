<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Meal & Cocktail Matcher</title>
    <style>
      /* Basic styling */
    </style>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1 id="title">Meal + Cocktail Matching</h1>

    <div id="meal-container" class="meal">
      <h2 id="mealHead"></h2>
      <p><span id="mealArea"></span> - <span id="mealCategory"></span></p>
      <img src="" alt="meal image" id="mealImg" />
      <label for="mealIngredients"> <b>Ingredients:</b> </label>
      <ul id="mealIngredients"></ul>
      <label for="mealInstructions"> <b>Instructions:</b> </label>
      <p id="mealInstructions"></p>
    </div>

    <div id="cocktail-container" class="cocktail">
      Matched or random cocktail info goes here
      
    </div>

    <script src="script.js"></script>
  </body>
</html>
